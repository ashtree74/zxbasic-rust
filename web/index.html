<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>zxbasic-rust — MVP-2</title>
  <style>
    html, body { margin: 0; background: #181818; color: #ddd; font: 14px/1.4 system-ui, sans-serif; }
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 1rem; }
    canvas { image-rendering: pixelated; border: 1px solid #333; display: block; }
    .caption { opacity: .6; }
  </style>
</head>
<body>
  <canvas id="screen" width="256" height="192" style="width: 512px; height: 384px;" tabindex="0"></canvas>
  <div class="caption">zxbasic-rust · MVP-2 · try <code>10 LET A=1</code> / <code>20 PRINT A*A</code> / <code>RUN</code></div>
  <script type="module">
    import init, { System } from "./pkg/zxbasic_web.js";

    await init();
    const sys = new System();
    const canvas = document.getElementById("screen");
    const ctx = canvas.getContext("2d");
    canvas.focus();

    function frame() {
      const buf = sys.render();
      const img = new ImageData(new Uint8ClampedArray(buf), 256, 192);
      ctx.putImageData(img, 0, 0);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        sys.feed_enter();
        e.preventDefault();
      } else if (e.key === "Backspace") {
        sys.feed_backspace();
        e.preventDefault();
      } else if (e.key.length === 1) {
        const code = e.key.charCodeAt(0);
        if (code >= 32 && code <= 126) {
          sys.feed_char(code);
          e.preventDefault();
        }
      }
    });
  </script>
</body>
</html>
